services:
  - type: web
    name: botarena-backend
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm install && npm run build --workspace backend
    startCommand: npm run start --workspace backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ORIGIN_SUFFIXES
        value: vercel.app
