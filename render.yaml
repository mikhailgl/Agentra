services:
  - type: web
    name: botarena-backend
    runtime: node
    repo: https://github.com/mikhailgl/Agentra.git
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: npm ci --include=dev && npm run build --workspace backend
    startCommand: npm run start --workspace backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Set these secret values in the Render Dashboard after creating the service.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://botarena-frontend.onrender.com
      # Allows Vercel preview branch URLs like https://project-git-branch-team.vercel.app.
      - key: CORS_ORIGIN_SUFFIXES
        value: vercel.app,onrender.com

  - type: web
    name: botarena-frontend
    runtime: static
    repo: https://github.com/mikhailgl/Agentra.git
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run build --workspace frontend
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://botarena-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
